<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Care Expert Trivia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <div id="home-screen" class="glass-card">
            <div class="icon-header">✨</div>
            <h1>Skin Care Trivia</h1>
            <p>Demuestra tus conocimientos sobre el cuidado de la piel y las últimas tendencias de belleza.</p>
            <button id="start-btn" class="btn-main">Iniciar Juego</button>
        </div>

        <div id="quiz-screen" class="glass-card hidden">
            <div class="quiz-meta">
                <span id="progress-text">Pregunta 1 de 20</span>
                <div class="timer-badge">Tiempo: <span id="timer-sec">10</span>s</div>
                <span id="score-text">Puntos: 0</span>
            </div>
            
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>

            <h2 id="question-label">Cargando pregunta...</h2>
            
            <div id="options-grid" class="options-grid"></div>

            <div class="quiz-footer">
                <button id="next-btn" class="btn-next hidden">Siguiente Pregunta</button>
                <button id="reset-btn" class="btn-outline">Reiniciar Partida</button>
            </div>
        </div>

        <div id="result-screen" class="glass-card hidden">
            <div class="icon-header">🏆</div>
            <h2>¡Partida Terminada!</h2>
            <p id="final-score-msg"></p>
            <div class="result-actions">
                <button id="new-game-btn" class="btn-main">Nuevo Juego (Preguntas Nuevas)</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
